version: '3'

vars:
  CV_FILENAME: Kalinin_Nikita_CV

tasks:
  # ======== Environment ========
  sync:
    desc: Sync dependencies (dev group) using uv
    cmds:
      - uv sync --all-groups

  sync-frozen:
    desc: Sync dependencies using locked versions
    cmds:
      - uv sync --frozen --all-groups

  init:
    desc: Full project setup
    cmds:
      - task: sync
      - task: precommit

  # ======== Pre-commit ========
  precommit:
    desc: Install git hooks
    cmds:
      - uv run pre-commit install --install-hooks

  precommit-run:
    desc: Run pre-commit on all files
    cmds:
      - uv run pre-commit run --all-files

  # ======== Commitizen ========
  cz-commit:
    desc: Commit using Conventional Commits
    cmds:
      - uv run cz commit

  cz-check:
    desc: Check commit messages
    cmds:
      - uv run cz check

  cz-bump:
    desc: Bump version and update changelog
    deps: [sync]
    cmds:
      - uv run cz bump

  release:
    desc: Bump version and push tags
    deps: [cz-bump]
    cmds:
      - git push --follow-tags

  # ======== Formatting ========

  fmt:
    desc: Format YAML files with yamlfmt
    cmds:
      - task: validate
      - yamlfmt cv/*

  validate:
    desc: Validate CV YAML against RenderCV JSON Schema
    cmds:
      - >
        uv run check-jsonschema
        --schemafile https://raw.githubusercontent.com/rendercv/rendercv/refs/tags/v2.6/schema.json
        cv/data.yaml

  # ======== RenderCV ========
  render:
    desc: Render CV from YAML to PDF
    cmds:
      - uv run rendercv render cv/data.yaml
        --pdf-path ../output/{{.CV_FILENAME}}.pdf
        --typst-path ../output/{{.CV_FILENAME}}.typ
        --markdown-path ../output/{{.CV_FILENAME}}.md
        --html-path ../output/{{.CV_FILENAME}}.html
        --png-path ../output/{{.CV_FILENAME}}.png
        -nomd -nohtml

  # ======== Other ========
  clean:
    desc: Remove generated build artifacts
    cmds:
      - rm -f ./output/*
