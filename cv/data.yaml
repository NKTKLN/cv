  social_networks:
    - network: Telegram
      username: "nktkln_work"
    - network: GitHub
      username: "NKTKLN"

  sections:
    О себе:
      - >
        Junior ML Engineer: классический и табличный ML, прикладная математика
        и production-инжиниринг на Python. Реализую ML-алгоритмы и алгоритмы
        векторного поиска (HNSW, LSH) с нуля и подтверждаю бенчмарками против
        scikit-learn/XGBoost (расхождение в тысячных долях метрики); строю
        end-to-end пайплайны для Kaggle (Spaceship Titanic 0.805) с feature
        engineering и Optuna-тюнингом.
      - >
        К ML-навыкам прилагается реальный production-backend опыт: асинхронный
        backend LLM-ассистента с агентным OpenAI tool-calling и вычислительный
        REST-сервис на FastAPI с кэшированием. Строгая типизация (mypy strict),
        security-аудит зависимостей, воспроизводимые окружения, CI. Соавтор двух
        научных публикаций и зарегистрированной программы для ЭВМ.

    Проекты:
      - name: "Code Kata — ML-алгоритмы с нуля и Kaggle-пайплайны"
        summary: >
          Личный ML-проект: классические алгоритмы машинного обучения,
          реализованные с нуля на Python/NumPy и подтвержденные бенчмарками
          против библиотечных реализаций, плюс end-to-end пайплайны
          для Kaggle-соревнований.

          Репозиторий: [github.com/NKTKLN/code-kata](https://github.com/NKTKLN/code-kata)
        highlights:
          - >
            Реализовал с нуля gradient boosting (с ручным выводом градиентов),
            random forest, деревья решений, bagging, stacking, kNN, линейную
            и логистическую регрессию; бенчмарки подтвердили точность на уровне
            scikit-learn/XGBoost (расхождение в тысячных долях метрики).
          - >
            Построил end-to-end пайплайны для Kaggle (Spaceship Titanic — 0.805,
            Titanic — 0.782): EDA, доменный feature engineering, сравнение
            CatBoost/LightGBM/XGBoost и Optuna-тюнинг (TPE, 150 trials, GPU).
          - >
            Реализовал и сравнил 4 алгоритма приближенного поиска ближайших
            соседей (HNSW, LSH, k-d trees, Annoy-подобный индекс) по точности,
            скорости и памяти — основа vector search в RAG-системах.

      - name: "AI Notes API — асинхронный backend LLM-ассистента над заметками"
        summary: >
          Личный backend-проект для LLM-ассистента над приватными заметками:
          асинхронный FastAPI-сервис с RAG по загруженным документам, агентным
          циклом OpenAI tool-calling, долгосрочной памятью диалога и фоновой
          генерацией.
        highlights:
          - >
            Спроектировал асинхронный сервис на FastAPI + async SQLAlchemy 2.0 /
            PostgreSQL по слоистой архитектуре (api / services / repositories);
            довел покрытие до 89.5% line / 83.1% branch (456 тестов) при строгом
            mypy и CI на Postgres + Redis.
          - >
            Реализовал агентный цикл OpenAI tool-calling с реестром из
            5 CRUD-инструментов: модель сама ищет и изменяет заметки пользователя
            в рамках одного диалога.
          - >
            Устранил гонки при параллельной генерации, заменив read-modify-write
            на атомарный UPDATE ... WHERE status=IDLE ... RETURNING — ровно одна
            активная генерация на сессию без распределенных локов.
          - >
            Построил RAG-пайплайн для grounded-ответов по документам: extraction
            (MarkItDown) → token-chunking с overlap (tiktoken) → эмбеддинги OpenAI
            → векторный поиск по косинусной дистанции в PostgreSQL/pgvector
            (top-5 чанков).

      - name: "QUICK — Вычислительный backend-сервис моделирования МИИС"
        summary: >
          Исследовательско-инженерный проект (постановка — в соавторстве, весь код
          и 144 коммита — мои): REST API и веб-интерфейс над вычислительным ядром
          для моделирования медицинских ИИС.

          Репозиторий: [github.com/NKTKLN/quick](https://github.com/NKTKLN/quick)
        highlights:
          - >
            Реализовал три взаимозаменяемых вычислительных движка за единым
            интерфейсом (паттерны Factory и Strategy): аналитический (спектральное
            разложение), численный (уравнения Колмогорова, SciPy solve_ivp / RK45)
            и Монте-Карло симуляцию — выбор движка под требования к точности и
            скорости расчета.
          - >
            Создал гибридный решатель NumPy + mpmath с автоматическим обнаружением
            численно нестабильных участков и их пересчетом с произвольной точностью —
            примерно в 2 раза быстрее полного расчета в высокой точности и без потери
            корректности результата.

