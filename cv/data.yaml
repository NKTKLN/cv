        от реализации алгоритмов машинного обучения с нуля и Kaggle-пайплайнов до
        численного моделирования, API-сервисов и контейнеризованных приложений.
      - >
        Интересуюсь ML Engineering и AI-инфраструктурой: воспроизводимыми экспериментами,
        model inference, backend-сервисами для ML/LLM-приложений, качественной архитектурой
