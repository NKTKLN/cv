    Проекты:
      - name: "QUICK — Программный комплекс моделирования и анализа МИИС"
        summary: >
          Командный исследовательско-инженерный проект: веб-сервис и вычислительный
          модуль для моделирования медицинских информационно-измерительных систем
          реального времени и расчета их performance-характеристик.

          Репозиторий: [github.com/NKTKLN/quick](https://github.com/NKTKLN/quick)
        highlights:
          - >
            Участвовал в проектировании архитектуры с разделением на уровень устройства
            и серверный уровень: ввод параметров системы, выбор расчетной модели,
            хранение результатов, визуализация и экспорт вычислений.
          - >
            Переводил математическую постановку в программные компоненты для расчета
            стационарных и переходных характеристик системы: вероятностей состояний,
            вероятности отказа, пропускной способности, среднего числа заявок
            и времени переходного режима.
          - >
            Реализовал три независимых решателя: аналитический на основе спектрального
            разложения матрицы интенсивностей переходов, численный с интегрированием
            уравнений Колмогорова методом RK45 и имитационный решатель.
          - >
            Спроектировал переключение расчетных стратегий через Factory-подход,
            чтобы добавлять новые методы моделирования без изменения вызывающего кода.
          - >
            Работал с моделями систем массового обслуживания с конечным буфером,
            коррелированным входным потоком и нетерпеливыми заявками для анализа
            поведения системы в переходном и стационарном режимах.

      - name: "Code Kata — реализация ML-алгоритмов и Kaggle-пайплайнов"
        summary: >
          Личный образовательный ML-проект: репозиторий Jupyter-ноутбуков и Python-утилит
          для реализации классических алгоритмов машинного обучения с нуля, сравнения
          с библиотечными реализациями и построения end-to-end пайплайнов на табличных
          задачах.

          Репозиторий: [github.com/NKTKLN/code-kata](https://github.com/NKTKLN/code-kata)
        highlights:
          - >
            Реализовал с нуля набор базовых ML-алгоритмов и оберток: линейную и
            логистическую регрессию, kNN, деревья решений, bagging, random forest,
            gradient boosting, stacking, grid search и randomized search.
          - >
            Исследовал разные стратегии поиска ближайших соседей и ускорения kNN:
            brute-force, KD-tree, LSH, HNSW и Annoy-подобный индекс, сравнивая их
            с scikit-learn-подходами на классификационных и регрессионных задачах.
          - >
            Построил практические ML-пайплайны для Kaggle Titanic и Spaceship Titanic
            на моделях градиентного бустинга: EDA, feature engineering, обработка
            пропусков, Optuna-тюнинг, кросс-валидация и подготовка submission-файлов;
            получил Kaggle score 0.78 и 0.80 соответственно.
          - >
            Использовал scikit-learn, NumPy, pandas, Matplotlib, Seaborn, XGBoost,
            LightGBM, CatBoost и Optuna для экспериментов, оценки качества моделей
            и визуализации метрик.

