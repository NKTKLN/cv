        полного цикла: асинхронный backend LLM-ассистента с агентным
        OpenAI tool-calling, вычислительный REST-сервис с кэшированием,
        реализация ML-алгоритмов и алгоритмов векторного поиска (HNSW, LSH)
        с нуля с бенчмарками против scikit-learn/XGBoost.
      - >
        Production-подход в каждом проекте: строгая типизация (mypy strict),
        security-аудит зависимостей, воспроизводимые окружения,
        conventional commits. Соавтор двух научных
        публикаций и зарегистрированной программы для ЭВМ.

    Проекты:
      - name: "AI Notes API — асинхронный backend LLM-ассистента над заметками"
        summary: >
          Личный backend-проект для LLM-ассистента над приватными заметками
          (в активной разработке): асинхронный FastAPI-сервис с агентным циклом
          OpenAI tool-calling, долгосрочной памятью диалога и фоновой генерацией.
        highlights:
          - >
            Спроектировал асинхронный сервис на FastAPI + async SQLAlchemy 2.0 /
            PostgreSQL по слоистой архитектуре (api / services / repositories);
            довел покрытие до ~92% (376 тестов) при строгом mypy и CI
            на Postgres + Redis.
          - >
            Реализовал агентный цикл OpenAI tool-calling с реестром инструментов:
            модель сама ищет и изменяет заметки пользователя через CRUD-инструменты
            в рамках одного диалога.
          - >
            Устранил гонки при параллельной генерации, заменив read-modify-write
            на атомарный UPDATE ... WHERE status=IDLE ... RETURNING — ровно одна
            активная генерация на сессию без распределенных локов.

      - name: "QUICK — Вычислительный backend-сервис моделирования МИИС"
        summary: >
          Исследовательско-инженерный проект (математическая постановка — в
          соавторстве, весь код — мой, 144 коммита): REST API и веб-интерфейс
          вокруг вычислительного ядра для моделирования медицинских
          информационно-измерительных систем (~7,5 тыс. строк Python).

          Репозиторий: [github.com/NKTKLN/quick](https://github.com/NKTKLN/quick)
        highlights:
          - >
            Реализовал три взаимозаменяемых вычислительных движка за единым
            интерфейсом (паттерны Factory и Strategy): аналитический
            (спектральное разложение), численный (уравнения Колмогорова,
            SciPy solve_ivp / RK45) и Монте-Карло симуляцию.
          - >
            Создал гибридный решатель NumPy + mpmath с автоматическим
            обнаружением численно нестабильных участков и их пересчетом
            с произвольной точностью — примерно в 2 раза быстрее расчета
            целиком в высокой точности без потери корректности.
          - >
            Спроектировал версионированный REST API на FastAPI (Pydantic-валидация,
            обработка ошибок 422/500, OpenAPI), multi-stage Docker-сборку (non-root,
            healthcheck) и слоистую архитектуру: одно ядро обслуживает REST API
            и Streamlit-интерфейс с Plotly-визуализацией.

      - name: "Code Kata — ML-алгоритмы с нуля и Kaggle-пайплайны"
        summary: >
          Личный ML-проект: классические алгоритмы машинного обучения,
          реализованные с нуля на Python/NumPy и подтвержденные бенчмарками
          против библиотечных реализаций, плюс end-to-end пайплайны
          для Kaggle-соревнований.

          Репозиторий: [github.com/NKTKLN/code-kata](https://github.com/NKTKLN/code-kata)
        highlights:
          - >
            Реализовал с нуля gradient boosting (с ручным выводом градиентов),
            random forest, деревья решений, bagging, stacking, kNN, линейную
            и логистическую регрессию; бенчмарки подтвердили точность на уровне
            scikit-learn/XGBoost (расхождение в тысячных долях метрики).
          - >
            Реализовал и сравнил 4 алгоритма приближенного поиска ближайших
            соседей (HNSW, LSH, k-d trees, Annoy-подобный индекс) по точности,
            скорости и памяти — основа vector search в RAG-системах.
          - >
            Построил end-to-end пайплайны для Kaggle (Spaceship Titanic — 0.805,
            Titanic — 0.782): EDA, доменный feature engineering, сравнение
            CatBoost/LightGBM/XGBoost и Optuna-тюнинг (TPE, 150 trials, GPU).

